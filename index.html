/* ================= UI ================= */

function renderButtons(){
let c=document.getElementById("activities");
c.innerHTML="";
Object.keys(db).forEach(k=>{
let div=document.createElement("div");
div.onclick=()=>openActivity(k);
div.innerHTML=`
<div class="text-center cursor-pointer">
<img src="${eggImage}" class="w-16 mx-auto ${completed[k]?'egg-complete':''}">
<p>${completed[k]?"✅":"Egg "+k}</p>
</div>`;
c.appendChild(div);
});
}

function openActivity(k){
if(completed[k])return;
currentKey=k;

let data = db[k].levels[level];

let html = `
<h3 class="font-bold mb-2">📖 Read first:</h3>
<p class="mb-3 p-3 bg-yellow-100 rounded">${data.reading}</p>
`;

data.questions.forEach((q,i)=>{
html+=`<p class="mt-2 font-semibold">${q.q}</p>`;
q.options.forEach(opt=>{
html+=`<label class="block">
<input type="radio" name="q${i}" value="${opt}"> ${opt}
</label>`;
});
});

document.getElementById("title").innerText="Egg "+k;
document.getElementById("content").innerHTML=html;
document.getElementById("modal").style.display="flex";
}

function checkAnswer(){

let correctAll=true;

let questions = db[currentKey].levels[level].questions;

questions.forEach((q,i)=>{
let selected=document.querySelector(`input[name="q${i}"]:checked`);
if(!selected || selected.value!==q.a){
correctAll=false;
}
});

if(correctAll){
completed[currentKey]=true;
solved++;
document.getElementById("progress").innerText=solved;

clues.push(db[currentKey].clue);
renderClues();

closeModal();
renderButtons();

}else{
alert("❌ Some answers are incorrect. Try again!");
}
}

function renderClues(){
let ul=document.getElementById("clues");
ul.innerHTML="";
clues.forEach(c=>{
let li=document.createElement("li");
li.innerText=c;
ul.appendChild(li);
});
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>
